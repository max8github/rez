akka.javasdk {
  agent {
    # Switch provider by changing this one line.
    # Options: openai | anthropic | googleai-gemini | ollama
    model-provider = openai

    openai {
      model-name = "gpt-4o-mini"
      api-key = ${?OPENAI_API_KEY}
    }

    anthropic {
      model-name = "claude-sonnet-4"
      api-key = ${?ANTHROPIC_API_KEY}
      max-tokens = 4096
    }

    googleai-gemini {
      model-name = "gemini-2.5-flash"
      api-key = ${?GOOGLE_AI_GEMINI_API_KEY}
    }

    ollama {
      model-name = "llama3.2:latest"
      host = "http://192.168.178.174:11434"
    }
  }
}

twist {
  url = "https://twist.com/api/v3/integration_incoming/post_data"
  install_id = "412390"
}
google {
  //A facility calendar contains all src parameters, which are all its resources
  //Example of a facility calendar (full url) with two resources (two calendars):
  //https://calendar.google.com/calendar/u/0/embed?src=3d228lvsdmdjmj79662t8r1fh4@group.calendar.google.com&ctz=Europe/Berlin&src=63hd39cd9ppt8tajp76vglt394@group.calendar.google.com
  scheme = "https"
  host = "calendar.google.com"
  path = "/calendar/u/0/embed"
  ctz = "Europe/Berlin"
  // Map resource IDs to their Google Calendar IDs
  resource-calendars {
    "court-1" = "3d228lvsdmdjmj79662t8r1fh4@group.calendar.google.com"
    "court-2" = "63hd39cd9ppt8tajp76vglt394@group.calendar.google.com"
    "court-3" = "42cf1e8db6c37f2a7c8f02dbf9b6fc9d497008ecd92a30892ea7b1a380c8e130@group.calendar.google.com"
    "court-4" = "2bba1d7802c29ab3a4455cadaebc68b0bf79370ac009b053664c9a2decb2ea1a@group.calendar.google.com"
  }
}