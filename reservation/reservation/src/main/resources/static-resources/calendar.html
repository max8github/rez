<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rez Calendar</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap");

    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --panel-strong: #fff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d9cdbd;
      --accent: #1f6f5f;
      --accent-soft: #dff2ec;
      --warn: #b45309;
      --empty: #f6f1e8;
      --shadow: 0 18px 40px rgba(63, 47, 30, 0.08);
    }

    body[data-theme="etc-edingen"] {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --ink: #001f21;
      --muted: #58626f;
      --line: #c8d7ea;
      --accent: #23985d;
      --accent-soft: #dbf7d8;
      --warn: #d53d2f;
      --empty: #f8fbff;
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(31, 111, 95, 0.18), transparent 28%),
        linear-gradient(180deg, #f8f4ed 0%, var(--bg) 100%);
    }

    body[data-theme="etc-edingen"] {
      font-family: "Barlow", "Avenir Next", "Segoe UI", sans-serif;
      background: #ffffff;
    }

    main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    body[data-theme="etc-edingen"] main {
      max-width: 1240px;
      padding: 44px 28px 56px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    body[data-theme="etc-edingen"] h1 {
      font-size: clamp(2.25rem, 4vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .subtle {
      color: var(--muted);
      margin-top: 10px;
      max-width: 760px;
    }

    body[data-theme="etc-edingen"] .subtle {
      color: #425466;
      font-size: 1rem;
      line-height: 1.45;
      margin-top: 12px;
      max-width: 920px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      background: rgba(255, 250, 242, 0.86);
      border: 1px solid rgba(217, 205, 189, 0.9);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      margin-bottom: 18px;
    }

    body[data-theme="etc-edingen"] .toolbar {
      gap: 14px;
      align-items: center;
      background: transparent;
      border: 0;
      border-top: 1px solid #eef3f7;
      border-bottom: 1px solid #eef3f7;
      border-radius: 0;
      padding: 18px 0;
      margin-bottom: 16px;
      box-shadow: none;
      backdrop-filter: none;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input {
      min-width: 260px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: var(--panel-strong);
      color: var(--ink);
    }

    body[data-theme="etc-edingen"] input {
      min-width: 320px;
      border-radius: 10px;
      border-color: #cbd8e6;
      padding: 11px 14px;
      color: #214255;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    body[data-theme="etc-edingen"] button {
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 600;
      background: #23985d;
      color: #ffffff;
    }

    button.secondary {
      background: var(--panel-strong);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    body[data-theme="etc-edingen"] button.secondary {
      background: #ffffff;
      color: #42627b;
      border-color: #cbd8e6;
    }

    body[data-theme="etc-edingen"] button.secondary:hover,
    body[data-theme="etc-edingen"] button.secondary:focus-visible {
      border-color: #2e6cff;
      color: #2e6cff;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    body[data-theme="etc-edingen"] .status {
      min-height: 22px;
      color: #55677d;
      margin-bottom: 20px;
    }

    .status.error {
      color: #991b1b;
    }

    body[data-theme="etc-edingen"] .status.error {
      color: #d53d2f;
    }

    .week-label {
      font-weight: 600;
    }

    body[data-theme="etc-edingen"] .week-label {
      color: #425466;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .board {
      display: grid;
      gap: 14px;
    }

    body[data-theme="etc-edingen"] .board {
      gap: 0;
      border-top: 1px solid #dbe6f1;
      border-left: 1px solid #dbe6f1;
      background: #ffffff;
    }

    .resource-row {
      background: var(--panel);
      border: 1px solid rgba(217, 205, 189, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    body[data-theme="etc-edingen"] .resource-row {
      display: grid;
      grid-template-columns: minmax(210px, 240px) minmax(0, 1fr);
      border: 0;
      border-right: 1px solid #dbe6f1;
      border-bottom: 1px solid #dbe6f1;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
    }

    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      background: linear-gradient(90deg, rgba(31, 111, 95, 0.08), rgba(255, 255, 255, 0));
      border-bottom: 1px solid var(--line);
    }

    body[data-theme="etc-edingen"] .resource-header {
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 18px 16px;
      background: #ffffff;
      border-right: 1px solid #dbe6f1;
      border-bottom: 0;
      min-height: 100%;
    }

    .resource-title {
      font-weight: 700;
      font-size: 1.05rem;
    }

    body[data-theme="etc-edingen"] .resource-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #33465b;
    }

    body[data-theme="etc-edingen"] .resource-header .subtle {
      display: none;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(150px, 1fr));
    }

    body[data-theme="etc-edingen"] .resource-grid {
      grid-template-columns: repeat(7, minmax(112px, 1fr));
      background: #ffffff;
    }

    .day-column {
      min-height: 180px;
      border-right: 1px solid var(--line);
      padding: 12px;
      background: rgba(255, 255, 255, 0.55);
    }

    body[data-theme="etc-edingen"] .day-column {
      min-height: 132px;
      padding: 10px 12px 14px;
      border-right-color: #dbe6f1;
      background: #ffffff;
    }

    .day-column:last-child {
      border-right: 0;
    }

    .day-label {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    body[data-theme="etc-edingen"] .day-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-height: 58px;
      margin-bottom: 12px;
      color: #7d8793;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .day-date {
      display: block;
      color: var(--muted);
      font-weight: 500;
      margin-top: 2px;
    }

    body[data-theme="etc-edingen"] .day-date {
      margin-top: 0;
      color: #7a8189;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .booking {
      display: block;
      background: var(--accent-soft);
      border: 1px solid rgba(31, 111, 95, 0.2);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 10px 10px 10px 12px;
      margin-bottom: 8px;
    }

    body[data-theme="etc-edingen"] .booking {
      background: #24c364;
      border: 0;
      border-left: 0;
      border-radius: 4px;
      color: #ffffff;
      padding: 8px 10px;
      margin-bottom: 6px;
      box-shadow: none;
    }

    .booking-time {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    body[data-theme="etc-edingen"] .booking-time {
      color: #ffffff;
      font-size: 0.82rem;
      margin-bottom: 4px;
      letter-spacing: 0;
      text-transform: none;
    }

    .booking-title {
      display: block;
      font-weight: 600;
      line-height: 1.3;
    }

    body[data-theme="etc-edingen"] .booking-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .empty {
      height: calc(100% - 36px);
      min-height: 110px;
      border: 1px dashed rgba(217, 205, 189, 0.95);
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--empty);
      color: var(--muted);
      font-size: 0.9rem;
    }

    body[data-theme="etc-edingen"] .empty {
      height: auto;
      min-height: 52px;
      border: 1px dashed #e4edf6;
      border-radius: 12px;
      background: #fbfdff;
      color: #a3afbc;
      font-size: 0.84rem;
    }

    .hint {
      color: var(--warn);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    body[data-theme="etc-edingen"] .hint {
      color: #d53d2f;
    }

    .calendar-controls {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .day-picker {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .day-chip {
      border: 1px solid rgba(217, 205, 189, 0.95);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      padding: 10px 12px;
      text-align: left;
      box-shadow: var(--shadow);
    }

    .day-chip.active {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .day-chip-weekday,
    .day-chip-date {
      display: block;
      pointer-events: none;
    }

    .day-chip-weekday {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.8;
    }

    .day-chip-date {
      margin-top: 4px;
      font-size: 1rem;
      font-weight: 700;
    }

    .resource-pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 44px;
    }

    .resource-pager-info {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .resource-pager-actions {
      display: flex;
      gap: 10px;
    }

    .shared-timeline {
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid rgba(217, 205, 189, 0.95);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .shared-timeline-head {
      display: grid;
      grid-template-columns: 72px repeat(var(--court-count, 1), minmax(0, 1fr));
      border-bottom: 1px solid rgba(217, 205, 189, 0.95);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 250, 242, 0.94));
    }

    .shared-timeline-corner {
      border-right: 1px solid rgba(217, 205, 189, 0.95);
    }

    .shared-timeline-resource {
      padding: 16px 12px;
      border-right: 1px solid rgba(217, 205, 189, 0.95);
    }

    .shared-timeline-resource:last-child {
      border-right: 0;
    }

    .shared-timeline-resource-name {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .shared-timeline-resource-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .shared-timeline-body {
      display: grid;
      grid-template-columns: 72px repeat(var(--court-count, 1), minmax(0, 1fr));
      align-items: start;
    }

    .timeline-hours,
    .shared-timeline-column {
      position: relative;
    }

    .timeline-hours {
      border-right: 1px solid rgba(217, 205, 189, 0.95);
      background: rgba(255, 255, 255, 0.62);
    }

    .timeline-hour-label {
      position: absolute;
      left: 0;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .shared-timeline-column {
      border-right: 1px solid rgba(217, 205, 189, 0.95);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(246, 241, 232, 0.9));
      overflow: hidden;
    }

    .shared-timeline-column:last-child {
      border-right: 0;
    }

    .timeline-hour-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px solid rgba(217, 205, 189, 0.78);
    }

    .timeline-hour-fill {
      position: absolute;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.18);
    }

    .timeline-booking {
      position: absolute;
      left: 10px;
      right: 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, #1f8f71, #1b745c);
      color: white;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      box-shadow: 0 12px 24px rgba(31, 111, 95, 0.22);
      overflow: hidden;
    }

    .timeline-booking-time {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .timeline-booking-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .timeline-empty-note {
      position: absolute;
      inset: 10px 10px auto;
      border: 1px dashed rgba(217, 205, 189, 0.95);
      border-radius: 14px;
      min-height: 56px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 980px) {
      .hero {
        flex-direction: column;
        align-items: start;
      }

      .resource-grid {
        grid-template-columns: 1fr;
      }

      .day-column {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .day-column:last-child {
        border-bottom: 0;
      }

      input {
        min-width: 0;
        width: 100%;
      }

      .day-picker {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .resource-pager {
        align-items: start;
        flex-direction: column;
      }

      .shared-timeline-head,
      .shared-timeline-body {
        grid-template-columns: 52px repeat(var(--court-count, 1), minmax(0, 1fr));
      }

      .shared-timeline-resource {
        padding: 12px 8px;
      }

      .shared-timeline-resource-name {
        font-size: 0.9rem;
      }

      .shared-timeline-resource-meta {
        font-size: 0.76rem;
      }

      body[data-theme="etc-edingen"] main {
        padding: 32px 16px 40px;
      }

      body[data-theme="etc-edingen"] .resource-row {
        grid-template-columns: 1fr;
      }

      body[data-theme="etc-edingen"] .resource-header {
        border-right: 0;
        border-bottom: 1px solid #dbe6f1;
      }

      body[data-theme="etc-edingen"] .resource-grid {
        grid-template-columns: 1fr;
      }

      body[data-theme="etc-edingen"] .day-column {
        border-bottom: 1px solid #dbe6f1;
      }

      body[data-theme="etc-edingen"] .day-column:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
<main>
  <section class="hero">
    <div>
      <h1>Rez Calendar</h1>
      <p class="subtle">Read-only weekly schedule served directly from Rez. It reflects reservation events, so rebuilding Rez state rebuilds this calendar too.</p>
    </div>
    <div class="week-label" id="weekLabel"></div>
  </section>

  <section class="toolbar">
    <label>
      Facility ID
      <input id="facilityIdInput" placeholder="Enter facility id">
    </label>
    <button class="secondary" id="prevWeekButton" type="button">Previous</button>
    <button class="secondary" id="todayButton" type="button">Today</button>
    <button class="secondary" id="nextWeekButton" type="button">Next</button>
    <button id="reloadButton" type="button">Load Calendar</button>
  </section>

  <section class="calendar-controls">
    <div class="day-picker" id="dayPicker"></div>
    <div class="resource-pager" id="resourcePager"></div>
  </section>

  <div class="status" id="status"></div>
  <div class="board" id="board"></div>
</main>

<script>
  const DAY_START_HOUR = 7;
  const DAY_END_HOUR = 22;
  const HOUR_HEIGHT = 58;
  const params = new URLSearchParams(window.location.search);
  const board = document.getElementById("board");
  const dayPicker = document.getElementById("dayPicker");
  const resourcePager = document.getElementById("resourcePager");
  const statusEl = document.getElementById("status");
  const weekLabelEl = document.getElementById("weekLabel");
  const facilityIdInput = document.getElementById("facilityIdInput");
  const prevWeekButton = document.getElementById("prevWeekButton");
  const todayButton = document.getElementById("todayButton");
  const nextWeekButton = document.getElementById("nextWeekButton");
  const reloadButton = document.getElementById("reloadButton");
  const requestedTheme = readRequestedTheme(params.get("theme"));

  facilityIdInput.value = params.get("facilityId") || "";
  applyTheme(requestedTheme || "default");

  let currentWeekStart = readWeekStart(params.get("week"));
  let currentDay = clampDayToWeek(readSelectedDay(params.get("day")), currentWeekStart);
  let currentResourcePage = readPage(params.get("page"));

  prevWeekButton.addEventListener("click", () => moveWeek(-7));
  todayButton.addEventListener("click", () => {
    currentDay = startOfDay(new Date());
    currentWeekStart = startOfWeek(currentDay);
    currentResourcePage = 0;
    void loadCalendar();
  });
  nextWeekButton.addEventListener("click", () => moveWeek(7));
  reloadButton.addEventListener("click", () => void loadCalendar());
  facilityIdInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      void loadCalendar();
    }
  });

  void loadCalendar();

  function moveWeek(days) {
    currentDay = addDays(currentDay, days);
    currentWeekStart = addDays(currentWeekStart, days);
    currentResourcePage = 0;
    void loadCalendar();
  }

  function readWeekStart(value) {
    if (!value) return startOfWeek(new Date());
    const parsed = new Date(value + "T00:00:00");
    return Number.isNaN(parsed.getTime()) ? startOfWeek(new Date()) : startOfWeek(parsed);
  }

  function readSelectedDay(value) {
    if (!value) return startOfDay(new Date());
    const parsed = new Date(value + "T00:00:00");
    return Number.isNaN(parsed.getTime()) ? startOfDay(new Date()) : startOfDay(parsed);
  }

  function readPage(value) {
    const parsed = Number.parseInt(value || "0", 10);
    return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
  }

  function startOfWeek(date) {
    const copy = new Date(date);
    const day = copy.getDay();
    const diff = (day + 6) % 7;
    copy.setHours(0, 0, 0, 0);
    copy.setDate(copy.getDate() - diff);
    return copy;
  }

  function startOfDay(date) {
    const copy = new Date(date);
    copy.setHours(0, 0, 0, 0);
    return copy;
  }

  function addDays(date, amount) {
    const copy = new Date(date);
    copy.setDate(copy.getDate() + amount);
    return copy;
  }

  function clampDayToWeek(day, weekStart) {
    const normalizedDay = startOfDay(day);
    const weekEnd = addDays(weekStart, 6);
    if (normalizedDay < weekStart) return weekStart;
    if (normalizedDay > weekEnd) return weekEnd;
    return normalizedDay;
  }

  function formatDate(date) {
    const copy = new Date(date);
    return [
      copy.getFullYear(),
      String(copy.getMonth() + 1).padStart(2, "0"),
      String(copy.getDate()).padStart(2, "0")
    ].join("-");
  }

  function formatDateTime(date) {
    const copy = new Date(date);
    copy.setMinutes(0, 0, 0);
    return [
      copy.getFullYear(),
      String(copy.getMonth() + 1).padStart(2, "0"),
      String(copy.getDate()).padStart(2, "0")
    ].join("-") + "T" + [
      String(copy.getHours()).padStart(2, "0"),
      String(copy.getMinutes()).padStart(2, "0"),
      String(copy.getSeconds()).padStart(2, "0")
    ].join(":");
  }

  function updateUrl(facilityId) {
    const nextParams = new URLSearchParams();
    if (facilityId) nextParams.set("facilityId", facilityId);
    if (requestedTheme) nextParams.set("theme", requestedTheme);
    nextParams.set("week", formatDate(currentWeekStart));
    nextParams.set("day", formatDate(currentDay));
    if (currentResourcePage > 0) nextParams.set("page", String(currentResourcePage));
    window.history.replaceState({}, "", `${window.location.pathname}?${nextParams.toString()}`);
  }

  function readRequestedTheme(value) {
    return value === "etc-edingen" ? value : "";
  }

  function applyTheme(theme) {
    document.body.dataset.theme = theme || "default";
  }

  async function resolveTheme(facilityId) {
    if (requestedTheme) return requestedTheme;
    if (!facilityId) return "default";

    try {
      const response = await fetch(`/api/calendar/theme?facilityId=${encodeURIComponent(facilityId)}`);
      if (!response.ok) return "default";
      const payload = await response.json();
      return payload && payload.theme === "etc-edingen" ? payload.theme : "default";
    } catch (error) {
      return "default";
    }
  }

  function setStatus(message, isError = false) {
    statusEl.textContent = message;
    statusEl.className = isError ? "status error" : "status";
  }

  async function loadCalendar() {
    const facilityId = facilityIdInput.value.trim();
    const theme = await resolveTheme(facilityId);
    applyTheme(theme);
    currentDay = clampDayToWeek(currentDay, currentWeekStart);
    updateUrl(facilityId);
    renderWeekLabel(theme);
    renderDayPicker(theme);

    if (!facilityId) {
      board.innerHTML = "";
      dayPicker.innerHTML = "";
      resourcePager.innerHTML = "";
      setStatus("Add a facility id to load the weekly court schedule.");
      return;
    }

    setStatus("Loading reservations...");
    board.innerHTML = "";

    try {
      const resources = await fetchResources(facilityId);
      const events = await fetchEvents(facilityId);
      renderBoard(theme, resources, events);
      setStatus(buildStatus(theme, resources, events));
    } catch (error) {
      board.innerHTML = "";
      resourcePager.innerHTML = "";
      setStatus(error.message || "Failed to load calendar.", true);
    }
  }

  function renderWeekLabel(theme) {
    const weekEnd = addDays(currentWeekStart, 6);
    if (theme === "etc-edingen") {
      weekLabelEl.textContent = `${currentWeekStart.toLocaleDateString([], { month: "short", day: "numeric" })} - ${weekEnd.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" })}`;
      return;
    }

    weekLabelEl.textContent = `${currentDay.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric", year: "numeric" })}`;
  }

  async function fetchResources(facilityId) {
    const response = await fetch(`/api/calendar/resources?facilityId=${encodeURIComponent(facilityId)}`);
    if (!response.ok) {
      const message = await response.text();
      throw new Error(message || `Resource lookup failed (${response.status}).`);
    }

    const payload = await response.json();
    return Array.isArray(payload) ? payload : [];
  }

  async function fetchEvents(facilityId) {
    const start = formatDateTime(currentWeekStart);
    const end = formatDateTime(addDays(currentWeekStart, 7));
    const response = await fetch(`/api/calendar/events?facilityId=${encodeURIComponent(facilityId)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
    if (!response.ok) {
      const message = await response.text();
      throw new Error(message || `Event lookup failed (${response.status}).`);
    }

    const payload = await response.json();
    return Array.isArray(payload) ? payload : [];
  }

  function renderBoard(theme, resources, events) {
    if (theme === "etc-edingen") {
      renderEtcEdingenBoard(resources, events);
      resourcePager.innerHTML = "";
      return;
    }

    renderDefaultBoard(resources, events);
  }

  function renderDefaultBoard(resources, events) {
    if (resources.length === 0) {
      board.innerHTML = `<div class="resource-row"><div class="resource-header"><div><div class="resource-title">No courts registered</div><div class="hint">This facility has no resources yet.</div></div></div></div>`;
      resourcePager.innerHTML = "";
      return;
    }

    const grouped = groupEvents(events);
    const resourcesPerPage = getResourcesPerPage();
    const pageCount = Math.max(1, Math.ceil(resources.length / resourcesPerPage));
    currentResourcePage = Math.min(currentResourcePage, pageCount - 1);
    const pageStart = currentResourcePage * resourcesPerPage;
    const visibleResources = resources.slice(pageStart, pageStart + resourcesPerPage);
    const selectedDateKey = formatDate(currentDay);

    board.innerHTML = renderSharedTimeline(visibleResources, grouped, selectedDateKey);

    renderResourcePager(resources.length, pageCount, visibleResources.length);
  }

  function renderEtcEdingenBoard(resources, events) {
    if (resources.length === 0) {
      board.innerHTML = `<div class="resource-row"><div class="resource-header"><div><div class="resource-title">No courts registered</div><div class="hint">This facility has no resources yet.</div></div></div></div>`;
      return;
    }

    const grouped = groupEvents(events);
    const days = Array.from({ length: 7 }, (_, index) => addDays(currentWeekStart, index));

    board.innerHTML = resources.map((resource) => {
      const dayColumns = days.map((day) => {
        const key = `${resource.resourceId}:${formatDate(day)}`;
        const matches = (grouped.get(key) || []).sort((left, right) => left.start.localeCompare(right.start));
        const items = matches.length
          ? matches.map((event) => `
              <article class="booking">
                <span class="booking-time">${formatTime(event.start)} - ${formatTime(event.end)}</span>
                <span class="booking-title">${escapeHtml(event.title || "Reserved")}</span>
              </article>
            `).join("")
          : `<div class="empty">No booking</div>`;

        return `
          <section class="day-column">
            <div class="day-label">
              ${day.toLocaleDateString([], { weekday: "short" })}
              <span class="day-date">${day.toLocaleDateString([], { month: "short", day: "numeric" })}</span>
            </div>
            ${items}
          </section>
        `;
      }).join("");

      return `
        <section class="resource-row">
          <div class="resource-header">
            <div class="resource-title">${escapeHtml(resource.resourceName)}</div>
            <div class="subtle">${escapeHtml(resource.resourceId)}</div>
          </div>
          <div class="resource-grid">${dayColumns}</div>
        </section>
      `;
    }).join("");
  }

  function renderSharedTimeline(resources, grouped, selectedDateKey) {
    const totalHours = DAY_END_HOUR - DAY_START_HOUR;
    const timelineHeight = totalHours * HOUR_HEIGHT;
    const hourLines = Array.from({ length: totalHours + 1 }, (_, index) => {
      const top = index * HOUR_HEIGHT;
      const hour = DAY_START_HOUR + index;
      const label = hour <= DAY_END_HOUR ? `
        <span class="timeline-hour-label" style="top:${top}px">${String(hour).padStart(2, "0")}:00</span>
      ` : "";

      return {
        top,
        label,
        fill: index < totalHours ? `<div class="timeline-hour-fill" style="top:${top}px;height:${HOUR_HEIGHT}px"></div>` : "",
        line: `<div class="timeline-hour-line" style="top:${top}px"></div>`
      };
    });

    return `
      <section class="shared-timeline" style="--court-count:${resources.length}">
        <div class="shared-timeline-head">
          <div class="shared-timeline-corner"></div>
          ${resources.map((resource) => {
            const events = (grouped.get(`${resource.resourceId}:${selectedDateKey}`) || [])
              .sort((left, right) => left.start.localeCompare(right.start));

            return `
              <div class="shared-timeline-resource">
                <span class="shared-timeline-resource-name">${escapeHtml(resource.resourceName)}</span>
                <span class="shared-timeline-resource-meta">${events.length} booking${events.length === 1 ? "" : "s"}</span>
              </div>
            `;
          }).join("")}
        </div>
        <div class="shared-timeline-body">
          <div class="timeline-hours" style="height:${timelineHeight}px">
            ${hourLines.map((line) => line.label).join("")}
          </div>
          ${resources.map((resource) => {
            const events = (grouped.get(`${resource.resourceId}:${selectedDateKey}`) || [])
              .sort((left, right) => left.start.localeCompare(right.start));
            const bookings = events.map((event) => renderTimelineBooking(event)).join("");

            return `
              <div class="shared-timeline-column" style="height:${timelineHeight}px">
                ${hourLines.map((line) => line.fill + line.line).join("")}
                ${bookings || `<div class="timeline-empty-note">No bookings</div>`}
              </div>
            `;
          }).join("")}
        </div>
      </section>
    `;
  }

  function groupEvents(events) {
    const grouped = new Map();
    events.forEach((event) => {
      const dateKey = event.start.slice(0, 10);
      const key = `${event.resourceId}:${dateKey}`;
      const existing = grouped.get(key) || [];
      existing.push(event);
      grouped.set(key, existing);
    });
    return grouped;
  }

  function renderDayPicker(theme) {
    if (theme === "etc-edingen") {
      dayPicker.innerHTML = "";
      return;
    }

    const days = Array.from({ length: 7 }, (_, index) => addDays(currentWeekStart, index));
    dayPicker.innerHTML = days.map((day) => {
      const isActive = formatDate(day) === formatDate(currentDay);
      return `
        <button class="day-chip${isActive ? " active" : ""}" data-day="${formatDate(day)}" type="button">
          <span class="day-chip-weekday">${day.toLocaleDateString([], { weekday: "short" })}</span>
          <span class="day-chip-date">${day.toLocaleDateString([], { month: "short", day: "numeric" })}</span>
        </button>
      `;
    }).join("");

    dayPicker.querySelectorAll("[data-day]").forEach((buttonEl) => {
      buttonEl.addEventListener("click", () => {
        currentDay = readSelectedDay(buttonEl.dataset.day);
        currentResourcePage = 0;
        void loadCalendar();
      });
    });
  }

  function renderResourcePager(totalResources, pageCount, visibleCount) {
    if (pageCount <= 1) {
      resourcePager.innerHTML = "";
      return;
    }

    const resourcesPerPage = getResourcesPerPage();
    const start = currentResourcePage * resourcesPerPage + 1;
    const end = start + visibleCount - 1;
    resourcePager.innerHTML = `
      <div class="resource-pager-info">Courts ${start}-${end} of ${totalResources}</div>
      <div class="resource-pager-actions">
        <button class="secondary" id="prevResourcePageButton" type="button"${currentResourcePage === 0 ? " disabled" : ""}>Earlier Courts</button>
        <button class="secondary" id="nextResourcePageButton" type="button"${currentResourcePage >= pageCount - 1 ? " disabled" : ""}>More Courts</button>
      </div>
    `;

    const prevButton = document.getElementById("prevResourcePageButton");
    const nextButton = document.getElementById("nextResourcePageButton");
    if (prevButton) {
      prevButton.addEventListener("click", () => {
        currentResourcePage = Math.max(0, currentResourcePage - 1);
        void loadCalendar();
      });
    }
    if (nextButton) {
      nextButton.addEventListener("click", () => {
        currentResourcePage = Math.min(pageCount - 1, currentResourcePage + 1);
        void loadCalendar();
      });
    }
  }

  function renderTimelineBooking(event) {
    const start = parseLocalDateTime(event.start);
    const end = parseLocalDateTime(event.end);
    const startMinutes = clampMinutesWithinTimeline((start.getHours() * 60) + start.getMinutes());
    const endMinutes = clampMinutesWithinTimeline((end.getHours() * 60) + end.getMinutes());
    const top = ((startMinutes - (DAY_START_HOUR * 60)) / 60) * HOUR_HEIGHT;
    const timelineHeight = (DAY_END_HOUR - DAY_START_HOUR) * HOUR_HEIGHT;
    const rawHeight = Math.max(52, ((Math.max(endMinutes, startMinutes + 30) - startMinutes) / 60) * HOUR_HEIGHT);
    const maxHeight = Math.max(32, timelineHeight - top - 6);
    const height = Math.min(maxHeight, rawHeight);

    return `
      <article class="timeline-booking" style="top:${top}px;height:${height}px">
        <span class="timeline-booking-time">${formatTime(event.start)} - ${formatTime(event.end)}</span>
        <span class="timeline-booking-title">${escapeHtml(event.title || "Reserved")}</span>
      </article>
    `;
  }

  function clampMinutesWithinTimeline(minutes) {
    const min = DAY_START_HOUR * 60;
    const max = DAY_END_HOUR * 60;
    return Math.max(min, Math.min(max, minutes));
  }

  function getResourcesPerPage() {
    if (window.innerWidth < 720) return 2;
    if (window.innerWidth < 1100) return 3;
    if (window.innerWidth < 1500) return 4;
    return 5;
  }

  function buildStatus(theme, resources, events) {
    if (theme === "etc-edingen") {
      return `Showing ${events.length} reservation${events.length === 1 ? "" : "s"} for ${resources.length} court${resources.length === 1 ? "" : "s"}.`;
    }

    const selectedDateKey = formatDate(currentDay);
    const dayEvents = events.filter((event) => event.start.slice(0, 10) === selectedDateKey);
    return `Showing ${dayEvents.length} reservation${dayEvents.length === 1 ? "" : "s"} on ${currentDay.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" })} for ${resources.length} court${resources.length === 1 ? "" : "s"}.`;
  }

  function formatTime(value) {
    return parseLocalDateTime(value).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function parseLocalDateTime(value) {
    const [datePart, timePart] = value.split("T");
    const [year, month, day] = datePart.split("-").map(Number);
    const [hour, minute, second] = timePart.split(":").map(Number);
    return new Date(year, month - 1, day, hour, minute, second || 0);
  }

  function escapeHtml(value) {
    return value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#39;");
  }
</script>
